services:
  configurator:
    environment:
      PROJECT_CLONE_URL: https://github.com/ajeetraina/labspace-ai-governance
      # Point the IDE tab at the host-side ttyd. sbx must run on the host,
      # so the terminal can't be a container — the labspace provider below
      # starts a host ttyd on :8085 and this URL embeds it.
      TERMINAL_URL: http://host.docker.internal:8085

  # The labspace Compose provider starts a host-side ttyd terminal on :8085.
  # This replaces the old dummy-workspace + manual start-labspace.sh approach
  # so `docker labspace launch` works directly.
  workspace:
    provider:
      type: labspace
      options:
        type: ttyd

  # Disabled: the base service shares the workspace container's network
  # namespace, but the workspace is no longer a container.
  host-republisher: !reset null

  # Live sbx + MCP observability dashboard. Brought up alongside the labspace
  # UI so the user gets both with a single `bash start-labspace.sh`. The
  # Observability section of the lab embeds this on http://localhost:8090
  # via an iframe.
  observability:
    build:
      context: ./labspace/kits/observability
    image: labspace-observability:latest
    # Run as root so the container can read the bind-mounted /var/run/docker.sock.
    # The default distroless 'nonroot' user (uid 65532) doesn't match the host
    # docker group's GID and gets EACCES. Read-only mount + no other privileges
    # keeps the blast radius small.
    user: "0"
    ports:
      - "8090:8090"
    environment:
      SBX_DAEMON_LOG: /var/log/sbx/sandboxes/sandboxd/daemon.log
      SBX_MCP_LOG: /var/log/sbx/sandboxes/sandboxd/mcp/mcp.log
      LISTEN_ADDR: ":8090"
      # Synthesised user identity stamped on every event. sbx v0.32.0
      # doesn't emit user identity natively in audit events; we use the
      # host user as a best-effort proxy. Override by setting LABSPACE_USER
      # in your shell before running start-labspace.sh.
      LABSPACE_USER: "${LABSPACE_USER:-${USER:-unknown}}"
    volumes:
      # macOS sbx daemon log path. On Linux this is typically
      # ~/.local/share/com.docker.sandboxes/ — adjust if running on Linux.
      # The whole sandboxes dir is mounted so the backend can also read
      # mcp/mcp.log alongside daemon.log.
      - "${HOME}/Library/Application Support/com.docker.sandboxes:/var/log/sbx:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: unless-stopped
