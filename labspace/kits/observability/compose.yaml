services:
  observability:
    build:
      context: .
    image: labspace-observability:latest
    ports:
      - "8090:8090"
    environment:
      SBX_DAEMON_LOG: /var/log/sbx/sandboxes/sandboxd/daemon.log
      LISTEN_ADDR: ":8090"
    volumes:
      # macOS path. On Linux the sbx daemon log is typically under
      # ~/.local/share/com.docker.sandboxes/ — adjust to your platform.
      - "${HOME}/Library/Application Support/com.docker.sandboxes:/var/log/sbx:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: unless-stopped

  # Optional MCP gateway. Opt-in via the 'with-gateway' profile so the
  # default `docker compose up` runs only the dashboard. Run both together:
  #   docker compose --profile with-gateway up -d --build
  mcp-gateway:
    image: docker/mcp-gateway
    profiles: ["with-gateway"]
    command:
      - "--servers=duckduckgo"
      - "--transport=sse"
      - "--port=8811"
      - "--verbose=true"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    ports:
      - "8811:8811"
    restart: unless-stopped
