metadata:
  name: ai-governance
  title: Docker AI Governance
  description: |
    Define once, enforce everywhere. A hands-on lab proving how Docker
    AI Governance policies flow from the Admin Console to every developer's
    sandbox, covering both network and filesystem enforcement.

sections:
  - title: Setup
    contentPath: 00-setup.md

  - title: Why AI Governance
    contentPath: 01-introduction.md

  - title: The Policy Model
    contentPath: 02-the-policy-model.md

  - title: Network Enforcement Demo
    contentPath: 03-network-demo.md

  - title: Filesystem Enforcement Demo
    contentPath: 04-filesystem-demo.md

  - title: MCP Hands-On
    contentPath: 06-mcp-hands-on.md

  - title: Observability
    contentPath: 08-observability.md

  - title: What's Next
    contentPath: 05-whats-next.md

# Extra tabs in the right-hand panel. The default "IDE" tab is the primary
# terminal (ttyd on :8085). Each service below becomes an additional clickable
# tab. Terminal 2 is a second host ttyd (started by start-labspace.sh);
# Observability embeds the live sbx/MCP dashboard.
services:
  - title: Terminal 2
    icon: terminal
    url: http://localhost:8087

  - title: Observability
    icon: monitoring
    url: http://localhost:8090
